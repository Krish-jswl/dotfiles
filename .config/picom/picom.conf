backend = "glx";
vsync = true;

shadow = false;
fading = false;

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

use-damage = true;

# Transparency for Emacs
blur-background-exclude = [
  "class_g = 'slop'"
];

shadow-exclude = [
  "class_g = 'slop'",
  "class_g = 'maim'"
];

opacity-rule = [
  "90:class_g = 'Emacs'",
  "90:class_g = 'Alacritty'",
  "90:class_g = 'com.mitchellh.ghostty'",
  "100:class_g = 'slop'",
  "100:class_g = 'maim'"
];


# Blur settings
blur-kern = "3x3box"; # you can change this
blur-method = "dual_kawase"; # changeable as well
blur-strength = 5; # as you can probably guess, a higher number means a stronger blur
blur-background-exclude = [

];

# blur-background = true
# blur-method = "dual_kawase"
# blur-strength = 3
# blur-kern = "7x7box"


detect-rounded-corners = true;
corner-radius = 20;
rounded-corners-exclude = [
    "class_g = 'dwm'"
];
